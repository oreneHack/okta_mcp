name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run smoke
      - run: npm audit --audit-level=high
