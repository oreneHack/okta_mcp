name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run smoke
      - run: node scripts/collector-startup-test.mjs
      - run: node scripts/lab-mcp-smoke.mjs
      - run: npm audit --audit-level=high
